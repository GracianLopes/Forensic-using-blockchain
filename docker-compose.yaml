version: '3.8'

services:
  # Certificate Authority for Org1
  ca_org1:
    image: hyperledger/fabric-ca:latest
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org1
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw'
    volumes:
      - ./docker/fabric/ca-org1:/etc/hyperledger/fabric-ca-server
    container_name: ca_org1
    networks:
      - fabric-network

  # Orderer service
  orderer:
    container_name: orderer
    image: hyperledger/fabric-orderer:latest
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_KAFKA_TOPIC_REPLICATIONFACTOR=1
      - ORDERER_KAFKA_VERBOSE=true
    working_dir: /var/hyperledger/orderer
    command: orderer
    ports:
      - "7050:7050"
    volumes:
      - ./docker/fabric/orderer:/var/hyperledger/orderer
    networks:
      - fabric-network

  # Peer0 for Org1
  peer0_org1:
    container_name: peer0.org1
    image: hyperledger/fabric-peer:latest
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.org1
      - CORE_PEER_ADDRESS=peer0.org1:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/var/hyperledger/peer/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/var/hyperledger/peer/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/var/hyperledger/peer/tls/ca.crt
      - CORE_VM_DOCKER_HOSTNETWORKMODE=false
    working_dir: /var/hyperledger/peer
    command: peer node start
    ports:
      - "7051:7051"
      - "7052:7052"
    volumes:
      - ./docker/fabric/peer0.org1:/var/hyperledger/peer
    networks:
      - fabric-network

  # CouchDB for Peer0 Org1
  couchdb:
    container_name: couchdb
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    networks:
      - fabric-network

  # Backend API
  backend:
    container_name: forensics-api
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    environment:
      - NODE_ENV=development
      - PORT=3000
      - FABRIC_CHANNEL=forensic-channel
      - FABRIC_CHAINCODE=evidence-chaincode
      - FABRIC_ORG_MSP=Org1MSP
      - SKIP_BLOCKCHAIN_CONNECT=false
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - ./docker/fabric/wallet:/app/wallet
    depends_on:
      - peer0_org1
      - couchdb
    networks:
      - fabric-network

networks:
  fabric-network:
    driver: bridge

volumes:
  fabric-data:
